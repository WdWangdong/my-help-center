name: Deploy Help Center to Aliyun OSS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Configure OSS credentials
        run: |
          mkdir -p ~/.ossutil
          cat <<EOF > ~/.ossutil/config
          [Credentials]
          language=CH
          accessKeyId=${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          accessKeySecret=${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          endpoint=oss-cn-qingdao.aliyuncs.com
          EOF

      - name: Sync to OSS
        run: |
          # 下载 ossutil（Linux）
          wget https://gosspublic.alicdn.com/ossutil/1.7.16/ossutil64 -O ossutil
          chmod 755 ossutil
          ./ossutil cp -rf ./build/ oss://help-zdzx/ \
            --include "*.html" \
            --include "*.js" \
            --include "*.css" \
            --include "*.png" \
            --include "*.jpg" \
            --include "*.jpeg" \
            --include "*.svg" \
            --include "*.json" \
            --include "*.xml" \
            --delete